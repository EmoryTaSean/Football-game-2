<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Gridiron Arcade</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1b3a1a 0%, #081a07 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* Tactical field lines overlay */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.02) 2px, transparent 2px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 2px, transparent 2px);
            background-size: 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        .game-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 15px;
            position: relative;
            z-index: 1;
        }

        /* Main Arcade Stadium Container Layout */
        .stadium-container {
            background: linear-gradient(135deg, #1e1e1e 0%, #121212 100%);
            border: 2px solid #2ecc71;
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.7), 0 0 20px rgba(46, 204, 113, 0.2);
        }

        /* LED Scoreboard Widget */
        .scoreboard {
            background-color: #000000;
            border: 2px solid #333333;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            box-shadow: inset 0 0 15px rgba(0,0,0,1);
        }

        .score-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 0.65rem;
            color: #888888;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .score-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff3838;
            text-shadow: 0 0 8px rgba(255, 56, 56, 0.6);
            letter-spacing: 1px;
        }

        .status-banner {
            grid-column: span 2;
            background-color: #111111;
            border-top: 1px solid #222222;
            padding: 8px 5px 0 5px;
            font-size: 0.8rem;
            color: #ff9f43;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Scrolling Simulation Display Box */
        .simulation-log {
            background-color: #050d05;
            border: 1px solid #1c3d1a;
            border-radius: 8px;
            height: 110px;
            padding: 12px;
            margin-bottom: 25px;
            text-align: left;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #2ecc7 green;
        }

        .log-entry {
            color: #2ecc71;
            text-shadow: 0 0 4px rgba(46, 204, 113, 0.4);
            margin-bottom: 5px;
        }

        .log-entry.highlight {
            color: #ff9f43;
        }

        /* Strategy Action Buttons Deck Layout */
        .playbook-deck {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .play-btn {
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            color: #ffffff;
            padding: 14px;
            font-weight: 700;
            border-radius: 8px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.5);
            filter: brightness(1.1);
        }

        .play-btn.pass-play {
            background: linear-gradient(90deg, #3498db, #2980b9);
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
        }

        .play-btn.pass-play:hover {
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.5);
        }

        .play-btn.reset-play {
            background: #333333;
            box-shadow: none;
            margin-top: 10px;
            font-size: 0.75rem;
            padding: 10px;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="stadium-container">
            
            <!-- ARCADE SCOREBOARD -->
            <div class="scoreboard">
                <div class="score-block">
                    <span class="score-label">YOUR SCORE</span>
                    <div class="score-display" id="playerScore">00</div>
                </div>
                <div class="score-block">
                    <span class="score-label">FIELD POSITION</span>
                    <div class="score-display" id="fieldPos">OWN 20</div>
                </div>
                <div class="status-banner" id="gameStatus">
                    1ST & 10 | BALL ON OWN 20 YD LINE
                </div>
            </div>

            <!-- SIMULATION FEEDBACK DRAWER -->
            <div class="simulation-log" id="logBox">
                <div class="log-entry">Welcome to Gridiron Arcade! Choose a strategy play below to drive down the field...</div>
            </div>

            <!-- ACTION CHOICES PACK -->
            <div class="playbook-deck">
                <button class="play-btn" id="runBtn">Fullback Dive (Run)</button>
                <button class="play-btn pass-play" id="passBtn">Bullet Pass (Pass)</button>
                <button class="play-btn reset-play" id="resetBtn">Reset Game</button>
            </div>

        </div>
    </div>

    <!-- GAME ENGINE LOGIC FUNCTIONS -->
    <script>
        // System variable monitoring state arrays
        var score = 0;
        var yardLine = 20; 
        var down = 1;
        var distance = 10;
        var firstDownYard = 30;

        const pScore = document.getElementById('playerScore');
        const fPos = document.getElementById('fieldPos');
        const gStatus = document.getElementById('gameStatus');
        const logBox = document.getElementById('logBox');

        function updateDisplay() {
            pScore.textContent = score < 10 ? "0" + score : score;
            fPos.textContent = yardLine < 50 ? "OWN " + yardLine : "OPP " + (100 - yardLine);
            
            if (yardLine >= 100) {
                gStatus.textContent = "TOUCHDOWN! CHOOSE RESET TO PLAY AGAIN.";
            } else {
                gStatus.textContent = down + "ND & " + distance + " | BALL ON " + fPos.textContent;
            }
        }

        function printToLog(text, isHighlight) {
            var entry = document.createElement('div');
            entry.className = isHighlight ? "log-entry highlight" : "log-entry";
            entry.textContent = text;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function handlePlay(type) {
            if (yardLine >= 100) {
                printToLog("You already scored! Click Reset Game to play a new drive.", true);
                return;
            }

            var gain = 0;
            var chance = Math.random();

            if (type === 'run') {
                // Run play: Safe yards, low risk
                gain = Math.floor(Math.random() * 8) + 2; // 2 to 9 yards
                printToLog("Running Back hits the gap for a solid " + gain + " yard gain.");
            } else {
                // Pass play: Big yardage possibility, high incomplete risk
                if (chance < 0.40) {
                    gain = 0;
                    printToLog("Pass thrown deep downfield... Incomplete pass!");
                } else {
                    gain = Math.floor(Math.random() * 16) + 6; // 6 to 21 yards
                    printToLog("Quarterback fires a strike! Complete for a huge " + gain + " yards!", true);
                }
            }

            yardLine += gain;

            if (yardLine >= 100) {
                score += 7;
                printToLog("TOUCHDOWN!! You drove all the way down the field! +7 Points!", true);
                updateDisplay();
                return;
            }

            // Calculate first down math sequences
            if (yardLine >= firstDownYard) {
                down = 1;
                distance = 10;
                firstDownYard = yardLine + 10;
                printToLog("FIRST DOWN! The drive stays alive!", true);
            } else {
                down += 1;
                distance = firstDownYard - yardLine;
                if (down > 4) {
                    printToLog("Turnover on Downs! Resetting drive back to your own 20.", true);
                    yardLine = 20;
                    down = 1;
                    distance = 10;
                    firstDownYard = 30;
                }
            }
            updateDisplay();
        }

        document.getElementById('runBtn').onclick = function() { handlePlay('run'); };
        document.getElementById('passBtn').onclick = function() { handlePlay('pass'); };
        
        document.getElementById('resetBtn').onclick = function() {
            score = 0; yardLine = 20; down = 1; distance = 10; firstDownYard = 30;
