<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gridiron Pro Manager - Next-Gen Edition</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #0a1109 0%, #020402 100%);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: #ffffff; overflow-x: hidden; position: relative;
        }
        
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.008) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.008) 1px, transparent 1px);
            background-size: 20px 20px; z-index: 0; pointer-events: none;
        }

        .container { width: 100%; max-width: 680px; padding: 15px; position: relative; z-index: 1; }
        
        .cabinet {
            background: linear-gradient(135deg, #1f2126 0%, #0d0e11 100%);
            border: 2px solid #00ff66; border-radius: 24px; padding: 30px 25px;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 255, 102, 0.2);
            border-bottom: 6px solid #00b347;
        }
        
        .mode-nav {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 25px;
        }
        .mode-btn {
            background: linear-gradient(180deg, #252830 0%, #1a1c22 100%); 
            border: 1px solid #3a3f4d; color: #a0a5b5;
            padding: 14px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 1.5px; border-radius: 10px; cursor: pointer; transition: all 0.25s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .mode-btn:hover { color: #ffffff; border-color: #00ff66; transform: translateY(-1px); }
        .mode-btn.active-mode {
            background: linear-gradient(135deg, #00ff66 0%, #00b347 100%);
            color: #020402; border-color: #ffffff; font-weight: 800;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.5), inset 0 2px 4px rgba(255,255,255,0.3);
        }

        .mode-view { 
            background: linear-gradient(180deg, rgba(26,29,36,0.85) 0%, rgba(13,15,18,0.95) 100%); 
            border-radius: 16px; padding: 22px; margin-bottom: 25px; 
            border: 1px solid rgba(255,255,255,0.06); 
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .hidden-panel { display: none !important; }
        
        h4 { 
            margin: 0 0 15px 0; text-transform: uppercase; font-size: 0.95rem; 
            letter-spacing: 2px; color: #00ff66; border-bottom: 1px solid rgba(255,255,255,0.08); 
            padding-bottom: 10px; font-weight: 800;
        }

        /* MADDEN TEAM SELECTION DISPLAY CARDS */
        .madden-team-select-deck {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 10px;
        }
        .team-card {
            border-radius: 14px; padding: 18px; text-align: center;
            border: 2px solid #3a3f4d; transition: all 0.3s ease; position: relative;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }
        .team-card.user-selected { border-color: #ff9f43; box-shadow: 0 0 15px rgba(255,159,67,0.3); }
        .team-card.opp-selected { border-color: #007aff; box-shadow: 0 0 15px rgba(0,122,255,0.3); }
        
        .team-title-label { font-size: 1.1rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;}
        .team-stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 8px; margin-top: 10px;}
        .team-stat-box .num { font-size: 0.95rem; font-weight: 700; color: #fff; }
        .team-stat-box .lbl { font-size: 0.55rem; color: #8a92a3; text-transform: uppercase; }
        
        .arrow-nav-btn {
            background: #111; border: 1px solid #444; color: white; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 0.75rem;
        }
        .arrow-nav-btn:hover { background: #df4a3b; border-color: white; }

        /* BROADCAST SCOREBOARD CARD */
        .jumbotron-scoreboard {
            background-color: #050608; border: 2px solid #1a1c22; border-radius: 14px; padding: 18px;
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; margin-bottom: 25px;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.95), 0 4px 10px rgba(0,0,0,0.5);
            border-top: 4px solid #1a1c22;
        }
        .stat-lbl { font-size: 0.65rem; color: #5b6270; text-transform: uppercase; display: block; margin-bottom: 5px; letter-spacing: 1.5px; font-weight: bold;}
        .stat-value { font-size: 1.6rem; font-weight: bold; color: #ff9f43; text-shadow: 0 0 12px rgba(255, 159, 67, 0.4); font-family: monospace; }
        .stat-value.neon-green { color: #00ff66; text-shadow: 0 0 12px rgba(0, 255, 102, 0.5); }
        
        /* TEXTURED PRO FIELD VISUALIZER GRID */
        .stadium-field-mesh {
            background: repeating-linear-gradient(90deg, #1c4a1f, #1c4a1f 40px, #173d1a 40px, #173d1a 80px);
            border: 3px solid #0f2911; border-radius: 14px;
            height: 120px; position: relative; display: flex; align-items: center; justify-content: space-around; margin-bottom: 25px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 8px 20px rgba(0,0,0,0.4);
        }
        .stadium-field-mesh::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.18) 1px, transparent 1px),
                linear-gradient(0deg, rgba(255,255,255,0.4) 2px, transparent 2px),
                linear-gradient(180deg, rgba(255,255,255,0.4) 2px, transparent 2px);
            background-size: 10% 100%, 100% 100%, 100% 100%;
        }
        .token {
            width: 48px; height: 48px; border-radius: 50%; color: white; font-weight: 800;
            display: flex; align-items: center; justify-content: center; font-size: 1rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.6); border: 2.5px solid white; transition: all 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; z-index: 5;
        }
        .token::after {
            content: attr(data-team); position: absolute; top: -20px; font-size: 0.65rem; font-weight: 800; color: #8a92a3; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .token.off { background: linear-gradient(135deg, #ff3333 0%, #a30f08 100%); border-color: #ffffff; }
        .token.def { background: linear-gradient(135deg, #007aff 0%, #003366 100%); border-color: #ffffff; }
        
        /* PLAYER ULTIMATE REWARD DISPLAY CARD */
        .player-card-widget {
            display: flex; background: linear-gradient(135deg, #2b1810 0%, #120905 100%);
            border: 2px solid #ff9f43; border-radius: 12px; padding: 15px; align-items: center; gap: 20px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4); margin-top: 10px;
        }
        .card-badge {
            width: 60px; height: 75px; background: linear-gradient(135deg, #ff9f43 0%, #ff6b6b 100%);
            border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #000; font-weight: 900; box-shadow: 0 4px 10px rgba(255,159,67,0.3);
        }
        .card-badge .ovr-num { font-size: 1.8rem; line-height: 1; }
        .card-badge .ovr-lbl { font-size: 0.6rem; letter-spacing: 1px; }
        .card-details { flex-grow: 1; text-align: left; }
        .card-details h5 { margin: 0 0 5px 0; font-size: 1.05rem; color: #ffffff; text-transform: uppercase; font-weight: 800; }
        
        /* LIVE AUDIO TICKER CONSOLE BOX */
        .media-ticker {
            background-color: #040506; border-radius: 10px; padding: 15px; height: 78px;
            font-family: 'Courier New', monospace; font-size: 0.85rem; color: #00ff66; 
            overflow-y: auto; text-align: left; margin-bottom: 25px; border: 1px solid #0f1c11;
            box-shadow: inset 0 0 15px rgba(0,0,0,1); line-height: 1.4;
        }
        
        /* STRATEGY PLAYBOOK DECK PACK CARDS */
        .play-deck { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .p-card {
            background: linear-gradient(135deg, #2a2d37 0%, #191a22 100%); border: 1px solid rgba(255,255,255,0.06); padding: 16px;
            border-radius: 12px; text-align: left; cursor: pointer; transition: all 0.2s; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .p-card:hover { border-color: #00ff66; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,255,102,0.15); }
        .p-card h5 { margin: 0 0 5px 0; color: white; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.5px; font-weight: bold;}
        .p-card p { margin: 0; font-size: 0.72rem; color: #8e96a7; line-height: 1.3; }
        
        .data-row { display: flex; justify-content: space-between; font-size: 0.85rem; padding: 7px 0; border-bottom: 1px dashed rgba(255,255,255,0.06); }
        .data-row span { font-weight: bold; color: white; }
    </style>
</head>
<body>

    <div class="container">
        <div class="cabinet">
            
            <!-- MODE HUB SELECTION BAR SWITCHES -->
            <div class="mode-nav">
                <button class="mode-btn active-mode" id="navEx">Exhibition</button>
                <button class="mode-btn" id="navSeason">Season Mode</button>
